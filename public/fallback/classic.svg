<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810"/>
      <stop offset="100%" style="stop-color:#4a2c1a"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8dfc8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#c9922a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Livre ouvert -->
  <!-- Page gauche -->
  <path d="M120,80 L380,80 L380,420 L120,420 Q100,420 100,400 L100,100 Q100,80 120,80 Z" fill="url(#page)"/>
  <!-- Reliure -->
  <rect x="378" y="78" width="44" height="344" fill="#8b5e3c"/>
  <rect x="378" y="78" width="8" height="344" fill="#6b3a1c"/>
  <!-- Page droite -->
  <path d="M420,80 L680,80 Q700,80 700,100 L700,400 Q700,420 680,420 L420,420 L420,80 Z" fill="url(#page)"/>
  <!-- Lignes de texte - page gauche -->
  <line x1="130" y1="120" x2="360" y2="120" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="145" x2="360" y2="145" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="170" x2="360" y2="170" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="195" x2="340" y2="195" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="220" x2="360" y2="220" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="245" x2="360" y2="245" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="270" x2="350" y2="270" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="295" x2="360" y2="295" stroke="#c8b89a" stroke-width="2"/>
  <line x1="130" y1="320" x2="320" y2="320" stroke="#c8b89a" stroke-width="2"/>
  <!-- Lettre ornementée page gauche -->
  <text x="135" y="115" font-family="Georgia, serif" font-size="55" fill="#8b5e3c" opacity="0.4">L</text>
  <!-- Lignes de texte - page droite -->
  <line x1="440" y1="120" x2="680" y2="120" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="145" x2="680" y2="145" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="170" x2="660" y2="170" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="195" x2="680" y2="195" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="220" x2="680" y2="220" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="245" x2="650" y2="245" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="270" x2="680" y2="270" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="295" x2="680" y2="295" stroke="#c8b89a" stroke-width="2"/>
  <line x1="440" y1="320" x2="640" y2="320" stroke="#c8b89a" stroke-width="2"/>
  <!-- Ornement floral centre -->
  <circle cx="400" cy="250" r="18" fill="#8b5e3c" opacity="0.6"/>
  <circle cx="400" cy="250" r="10" fill="url(#gold)"/>
  <!-- Titre sous le livre -->
  <text x="400" y="456" font-family="Georgia, serif" font-size="30" fill="url(#gold)" text-anchor="middle" font-weight="bold">LITTÉRATURE CLASSIQUE</text>
  <text x="400" y="482" font-family="Georgia, serif" font-size="16" fill="#a08060" text-anchor="middle">XIXe siècle · Romantisme &amp; Réalisme</text>
</svg>

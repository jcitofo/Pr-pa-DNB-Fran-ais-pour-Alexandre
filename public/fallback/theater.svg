<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#5a0000"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#fffde0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fffde0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Rideau gauche -->
  <path d="M0,0 Q80,50 60,150 Q40,250 70,350 Q90,420 50,500 L0,500 Z" fill="url(#red)"/>
  <path d="M10,0 Q90,60 65,160 Q45,260 72,355 Q92,425 52,500 L10,500 Z" fill="#6b0000" opacity="0.5"/>
  <!-- Plis rideau gauche -->
  <path d="M30,0 Q50,80 40,180 Q30,280 45,380" fill="none" stroke="#5a0000" stroke-width="3"/>
  <path d="M55,0 Q75,90 60,190 Q48,290 62,390" fill="none" stroke="#5a0000" stroke-width="3"/>
  <!-- Rideau droit -->
  <path d="M800,0 Q720,50 740,150 Q760,250 730,350 Q710,420 750,500 L800,500 Z" fill="url(#red)"/>
  <path d="M790,0 Q710,60 735,160 Q755,260 728,355 Q708,425 748,500 L790,500 Z" fill="#6b0000" opacity="0.5"/>
  <!-- Plis rideau droit -->
  <path d="M770,0 Q750,80 760,180 Q770,280 755,380" fill="none" stroke="#5a0000" stroke-width="3"/>
  <path d="M745,0 Q725,90 740,190 Q752,290 738,390" fill="none" stroke="#5a0000" stroke-width="3"/>
  <!-- Frange dorée -->
  <rect x="50" y="0" width="700" height="25" fill="#c9a227"/>
  <line x1="50" y1="25" x2="750" y2="25" stroke="#a07820" stroke-width="2"/>
  <!-- Pompon frange gauche -->
  <circle cx="60" cy="32" r="8" fill="#c9a227"/>
  <circle cx="100" cy="35" r="8" fill="#c9a227"/>
  <circle cx="140" cy="32" r="8" fill="#c9a227"/>
  <circle cx="180" cy="35" r="8" fill="#c9a227"/>
  <circle cx="220" cy="32" r="8" fill="#c9a227"/>
  <circle cx="260" cy="35" r="8" fill="#c9a227"/>
  <circle cx="300" cy="32" r="8" fill="#c9a227"/>
  <circle cx="340" cy="35" r="8" fill="#c9a227"/>
  <circle cx="380" cy="32" r="8" fill="#c9a227"/>
  <circle cx="420" cy="35" r="8" fill="#c9a227"/>
  <circle cx="460" cy="32" r="8" fill="#c9a227"/>
  <circle cx="500" cy="35" r="8" fill="#c9a227"/>
  <circle cx="540" cy="32" r="8" fill="#c9a227"/>
  <circle cx="580" cy="35" r="8" fill="#c9a227"/>
  <circle cx="620" cy="32" r="8" fill="#c9a227"/>
  <circle cx="660" cy="35" r="8" fill="#c9a227"/>
  <circle cx="700" cy="32" r="8" fill="#c9a227"/>
  <circle cx="740" cy="35" r="8" fill="#c9a227"/>
  <!-- Lumière de scène -->
  <rect x="65" y="25" width="670" height="440" fill="url(#spotlight)"/>
  <!-- Deux masques (comédie + tragédie) -->
  <!-- Masque comédie (gauche) -->
  <ellipse cx="285" cy="260" rx="75" ry="85" fill="#f5e08a"/>
  <ellipse cx="285" cy="260" rx="75" ry="85" fill="none" stroke="#c9a227" stroke-width="3"/>
  <ellipse cx="258" cy="235" rx="14" ry="18" fill="#1a0a2e"/>
  <ellipse cx="312" cy="235" rx="14" ry="18" fill="#1a0a2e"/>
  <path d="M250,285 Q285,315 320,285" fill="none" stroke="#8b6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Masque tragédie (droite) -->
  <ellipse cx="515" cy="260" rx="75" ry="85" fill="#e8d5a3"/>
  <ellipse cx="515" cy="260" rx="75" ry="85" fill="none" stroke="#c9a227" stroke-width="3"/>
  <ellipse cx="488" cy="235" rx="14" ry="18" fill="#1a0a2e"/>
  <ellipse cx="542" cy="235" rx="14" ry="18" fill="#1a0a2e"/>
  <path d="M480,290 Q515,265 550,290" fill="none" stroke="#8b6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Titre -->
  <text x="400" y="430" font-family="Georgia, serif" font-size="36" fill="#f5e08a" text-anchor="middle" font-weight="bold">THÉÂTRE FRANÇAIS</text>
  <text x="400" y="460" font-family="Georgia, serif" font-size="17" fill="#c9a227" text-anchor="middle">Molière &amp; le classicisme</text>
</svg>

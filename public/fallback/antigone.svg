<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Colonnes grecques -->
  <rect x="80" y="120" width="30" height="280" fill="#3d2b6e" opacity="0.8"/>
  <rect x="75" y="110" width="40" height="20" fill="#4a3580"/>
  <rect x="75" y="390" width="40" height="20" fill="#4a3580"/>
  <rect x="690" y="120" width="30" height="280" fill="#3d2b6e" opacity="0.8"/>
  <rect x="685" y="110" width="40" height="20" fill="#4a3580"/>
  <rect x="685" y="390" width="40" height="20" fill="#4a3580"/>
  <!-- Fronton -->
  <polygon points="60,110 400,40 740,110" fill="none" stroke="#c9a227" stroke-width="3"/>
  <!-- Masque tragique -->
  <ellipse cx="400" cy="240" rx="90" ry="105" fill="#e8d5a3"/>
  <ellipse cx="400" cy="240" rx="90" ry="105" fill="none" stroke="#c9a227" stroke-width="3"/>
  <!-- Yeux ouverts — bouche vers le bas (tragédie) -->
  <ellipse cx="370" cy="215" rx="18" ry="22" fill="#1a1a2e"/>
  <ellipse cx="430" cy="215" rx="18" ry="22" fill="#1a1a2e"/>
  <ellipse cx="370" cy="212" rx="8" ry="10" fill="white" opacity="0.3"/>
  <ellipse cx="430" cy="212" rx="8" ry="10" fill="white" opacity="0.3"/>
  <!-- Sourcils froncés -->
  <path d="M350,195 Q370,185 390,192" fill="none" stroke="#8b6914" stroke-width="3" stroke-linecap="round"/>
  <path d="M410,192 Q430,185 450,195" fill="none" stroke="#8b6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Bouche tragique -->
  <path d="M365,278 Q400,258 435,278" fill="none" stroke="#8b6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Titre -->
  <text x="400" y="390" font-family="Georgia, serif" font-size="42" fill="url(#gold)" text-anchor="middle" font-weight="bold">ANTIGONE</text>
  <text x="400" y="420" font-family="Georgia, serif" font-size="20" fill="#c9a227" text-anchor="middle" opacity="0.9">Jean Anouilh · 1944</text>
  <text x="400" y="455" font-family="Georgia, serif" font-size="15" fill="#9b7fd4" text-anchor="middle" font-style="italic">Tragédie moderne</text>
</svg>

  <text x="400" y="440" font-family="Georgia, serif" font-size="30" fill="#2c3e50" text-anchor="middle" font-weight="bold">TEXTE ARGUMENTATIF</text>
  <text x="400" y="468" font-family="Georgia, serif" font-size="16" fill="#5a6a7a" text-anchor="middle">Thèse · Arguments · Réfutation</text>

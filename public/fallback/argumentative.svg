  <line x1="273" y1="90" x2="273" y2="360" stroke="#2c3e50" stroke-width="1" opacity="0.2"/>
  <line x1="527" y1="90" x2="527" y2="360" stroke="#2c3e50" stroke-width="1" opacity="0.2"/>
  <!-- Bas de page -->
  <rect x="30" y="360" width="740" height="2" fill="#2c3e50" opacity="0.3"/>
  <!-- Lignes du bas -->
  <rect x="40" y="372" width="340" height="8" rx="2" fill="#2c3e50" opacity="0.1"/>
  <rect x="40" y="386" width="300" height="8" rx="2" fill="#2c3e50" opacity="0.1"/>

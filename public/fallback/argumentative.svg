<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8dfc8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
  </defs>
  <!-- Fond type journal -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- En-tête journal -->
  <rect x="0" y="0" width="800" height="70" fill="url(#accent)"/>
  <text x="400" y="48" font-family="Georgia, serif" font-size="38" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">LE MONDE DES IDÉES</text>
  <!-- Ligne séparatrice -->
  <rect x="30" y="75" width="740" height="3" fill="#2c3e50"/>
  <rect x="30" y="82" width="740" height="1" fill="#2c3e50" opacity="0.4"/>

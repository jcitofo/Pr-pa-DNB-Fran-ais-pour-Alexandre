  <rect x="393" y="150" width="14" height="50" rx="7" fill="#4a4a4a"/>
  <circle cx="400" cy="145" r="15" fill="#3a3a3a"/>
  <!-- Ondes sonores -->
  <path d="M370,130 Q355,145 355,165 Q355,185 370,200" fill="none" stroke="#2c3e50" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M355,118 Q332,140 332,168 Q332,196 355,215" fill="none" stroke="#2c3e50" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <path d="M430,130 Q445,145 445,165 Q445,185 430,200" fill="none" stroke="#2c3e50" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M445,118 Q468,140 468,168 Q468,196 445,215" fill="none" stroke="#2c3e50" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <!-- Colonne 3 -->
  <rect x="540" y="100" width="220" height="18" rx="3" fill="#2c3e50" opacity="0.15"/>
  <rect x="540" y="128" width="220" height="10" rx="2" fill="#2c3e50" opacity="0.1"/>
  <rect x="540" y="145" width="200" height="10" rx="2" fill="#2c3e50" opacity="0.1"/>
  <rect x="540" y="162" width="220" height="10" rx="2" fill="#2c3e50" opacity="0.1"/>
  <rect x="540" y="179" width="190" height="10" rx="2" fill="#2c3e50" opacity="0.1"/>
  <rect x="540" y="196" width="220" height="10" rx="2" fill="#2c3e50" opacity="0.1"/>
  <rect x="540" y="213" width="205" height="10" rx="2" fill="#2c3e50" opacity="0.1"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Cigarette fumante (référence existentialiste) -->
  <rect x="340" y="160" width="120" height="180" rx="8" fill="#f5f0e8" opacity="0.15"/>
  <!-- Silhouette penseur assis -->
  <!-- Corps -->
  <rect x="370" y="280" width="60" height="80" rx="8" fill="#2c2c4a"/>
  <!-- Tête -->
  <circle cx="400" cy="255" r="35" fill="#c8a882"/>
  <!-- Bras coude sur genou -->
  <path d="M370,320 Q340,340 350,370" fill="none" stroke="#c8a882" stroke-width="14" stroke-linecap="round"/>
  <!-- Main sous le menton -->
  <circle cx="351" cy="375" r="12" fill="#c8a882"/>
  <!-- Ombre projetée -->
  <ellipse cx="400" cy="430" rx="80" ry="20" fill="black" opacity="0.4"/>
  <!-- Fumée de cigarette stylisée -->
  <path d="M560,120 Q570,100 555,80 Q540,60 555,40" fill="none" stroke="#8a8a8a" stroke-width="2" opacity="0.6"/>
  <path d="M575,125 Q590,105 572,82 Q558,62 575,38" fill="none" stroke="#8a8a8a" stroke-width="2" opacity="0.4"/>
  <!-- Cigarette -->
  <rect x="545" y="120" width="60" height="8" rx="4" fill="#f5f0e8" opacity="0.8"/>
  <rect x="545" y="120" width="10" height="8" rx="2" fill="#e8c88a" opacity="0.8"/>
  <!-- Texte existentialiste -->
  <text x="400" y="80" font-family="Georgia, serif" font-size="18" fill="#6a6a9a" text-anchor="middle" font-style="italic">"L'existence précède l'essence"</text>
  <text x="400" y="100" font-family="Georgia, serif" font-size="13" fill="#4a4a7a" text-anchor="middle">— Jean-Paul Sartre</text>
  <!-- Titre -->
  <text x="400" y="450" font-family="Georgia, serif" font-size="34" fill="#9b7fd4" text-anchor="middle" font-weight="bold">LITTÉRATURE MODERNE</text>
  <text x="400" y="478" font-family="Georgia, serif" font-size="16" fill="#6a6a9a" text-anchor="middle">XXe siècle · Existentialisme &amp; Absurde</text>
</svg>

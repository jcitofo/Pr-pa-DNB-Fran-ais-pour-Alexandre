<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="dawn" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#e67e22;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Aube qui se lève (Résistance) -->
  <rect x="0" y="300" width="800" height="200" fill="url(#dawn)"/>
  <!-- Étoiles -->
  <circle cx="100" cy="60" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="50" r="2" fill="white" opacity="0.9"/>
  <circle cx="500" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="620" cy="70" r="2" fill="white" opacity="0.8"/>
  <circle cx="720" cy="40" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="100" r="1" fill="white" opacity="0.5"/>
  <circle cx="450" cy="90" r="1" fill="white" opacity="0.6"/>
  <circle cx="680" cy="110" r="1.5" fill="white" opacity="0.7"/>
  <!-- Plume d'écriture -->
  <path d="M320,80 Q400,200 350,380" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
  <path d="M320,80 Q250,180 310,280 Q350,380 350,380" fill="white" opacity="0.15"/>
  <path d="M320,80 Q390,160 370,280 Q358,340 350,380" fill="white" opacity="0.1"/>
  <!-- Tip de la plume -->
  <path d="M350,375 L345,395 L355,395 Z" fill="#e8d5a3" opacity="0.9"/>
  <!-- Encrier -->
  <ellipse cx="352" cy="400" rx="25" ry="15" fill="#2c2c2c"/>
  <ellipse cx="352" cy="398" rx="22" ry="12" fill="#1a1a1a"/>
  <!-- Texte poème -->
  <text x="450" y="130" font-family="Georgia, serif" font-size="16" fill="white" opacity="0.7" font-style="italic">Liberté</text>
  <text x="440" y="155" font-family="Georgia, serif" font-size="14" fill="white" opacity="0.5" font-style="italic">Sur mes cahiers d'écolier</text>
  <text x="460" y="178" font-family="Georgia, serif" font-size="14" fill="white" opacity="0.5" font-style="italic">Sur mon pupitre et les arbres</text>
  <text x="445" y="201" font-family="Georgia, serif" font-size="14" fill="white" opacity="0.5" font-style="italic">Sur le sable sur la neige</text>
  <text x="490" y="224" font-family="Georgia, serif" font-size="16" fill="#e8b84b" opacity="0.8" font-style="italic">J'écris ton nom</text>
  <!-- Colombe de la paix (silhouette) -->
  <path d="M550,290 Q580,270 620,280 Q640,285 630,300 Q620,315 590,310 Q570,320 550,310 Z" fill="white" opacity="0.6"/>
  <path d="M610,275 Q630,255 650,265 Q645,280 625,282 Z" fill="white" opacity="0.6"/>
  <!-- Sol / horizon -->
  <rect x="0" y="400" width="800" height="100" fill="#1a0a05" opacity="0.6"/>
  <!-- Titre -->
  <text x="400" y="450" font-family="Georgia, serif" font-size="34" fill="#e8b84b" text-anchor="middle" font-weight="bold">POÉSIE DE LA RÉSISTANCE</text>
  <text x="400" y="478" font-family="Georgia, serif" font-size="16" fill="#8fa8c8" text-anchor="middle">Éluard · Aragon · 1940–1945</text>
</svg>

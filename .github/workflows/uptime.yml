name: Uptime Monitor — DNB Français + MAÏA Maths

on:
  schedule:
    # Toutes les 15 minutes, 24h/24 — GitHub envoie un email auto si ça échoue
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permet de lancer manuellement aussi

jobs:
  # ─────────────────────────────────────────────
  # APP 1 : Prépa DNB Français
  # ─────────────────────────────────────────────
  check-francais:
    name: 📚 DNB Français
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping — Page principale
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://pr-pa-dnb-fran-ais-pour-alexandre.vercel.app/")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ DNB Français — page principale inaccessible (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ DNB Français — page principale OK"

      - name: Ping — /api/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://pr-pa-dnb-fran-ais-pour-alexandre.vercel.app/api/health")
          echo "Status /api/health: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "❌ DNB Français — /api/health ne répond plus (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ DNB Français — /api/health OK (HTTP $STATUS)"

      - name: Ping — /api/generate
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            -X POST -H "Content-Type: application/json" \
            -d '{"textType":"SURPRISE"}' \
            "https://pr-pa-dnb-fran-ais-pour-alexandre.vercel.app/api/generate" || true)
          echo "Status /api/generate: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "❌ DNB Français — /api/generate ne répond plus (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ DNB Français — /api/generate OK (HTTP $STATUS)"

  # ─────────────────────────────────────────────
  # APP 2 : MAÏA — Maths DNB
  # ─────────────────────────────────────────────
  check-maia:
    name: 🧮 MAÏA Maths
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping — Page principale
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://dnb-maths.vercel.app/")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ MAÏA — page principale inaccessible (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ MAÏA — page principale OK"

      - name: Ping — /api/chat (doit répondre, pas timeout)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            -X POST -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"ping"}],"topic":"test"}' \
            "https://dnb-maths.vercel.app/api/chat" || true)
          echo "Status /api/chat: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "❌ MAÏA — /api/chat ne répond plus (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ MAÏA — /api/chat OK (HTTP $STATUS)"
